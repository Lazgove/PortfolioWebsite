<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Gui</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body{
    margin:0; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:#FFFFFF; color:#17171A;
    font-family:'Roboto', sans-serif;
    text-align:center; padding:20px;
  }
  h1{ font-size:clamp(48px,10vw,96px); margin:0; letter-spacing:-0.02em; font-family:'Bricolage Grotesque', sans-serif; font-weight:800; }
  p{ color:#6E6E76; font-family:'Roboto', sans-serif; margin:16px 0 28px; }
  a{ color:#17171A; text-decoration:none; font-family:'Roboto', sans-serif; font-weight:500; font-size:13px; letter-spacing:0.02em; border:1px solid #D4D4D9; padding:11px 24px; border-radius:999px; }
  a:hover{ border-color:#6D74D6; background:#6D74D6; color:#FFFFFF; }
</style>
</head>
<body>
  <h1>404</h1>
  <p>This page doesn't exist.</p>
  <a href="/">← Back to home</a>
</body>
</html>
