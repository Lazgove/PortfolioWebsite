<script src="js/data.js"></script>
<script>
const themeToggle = document.getElementById('themeToggle');
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
let currentTheme = localStorage.getItem('theme') || (prefersDark ? 'dark' : 'light');
function applyTheme() {
  if (currentTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  else document.documentElement.removeAttribute('data-theme');
}
applyTheme();
themeToggle.addEventListener('click', () => {
  currentTheme = currentTheme === 'light' ? 'dark' : 'light';
  localStorage.setItem('theme', currentTheme);
  applyTheme();
});

let currentLang = localStorage.getItem('lang') || 'en';
function applyLang() {
  document.documentElement.lang = currentLang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (I18N[currentLang] && I18N[currentLang][key]) el.textContent = I18N[currentLang][key];
  });
  document.getElementById('langToggle').textContent = currentLang === 'en' ? 'FR' : 'EN';
}
document.getElementById('langToggle').addEventListener('click', () => {
  currentLang = currentLang === 'en' ? 'fr' : 'en';
  localStorage.setItem('lang', currentLang);
  applyLang();
});
if (currentLang !== 'en') applyLang();

const menuToggle = document.getElementById('menuToggle');
const headerEl = document.querySelector('header');
menuToggle.addEventListener('click', () => headerEl.classList.toggle('nav-open'));
document.querySelectorAll('nav a').forEach(link => {
  link.addEventListener('click', () => headerEl.classList.remove('nav-open'));
});
</script>
